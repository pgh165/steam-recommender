services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: steam_recommender
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d steam_recommender"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/steam_recommender
      - OLLAMA_BASE_URL=http://tq-ollama:11434
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - tq-net
    volumes:
      - .:/app

volumes:
  postgres_data:

networks:
  default:
  tq-net:
    external: true
    name: twenty-questions_tq-net
